// ── HELPERS ───────────────────────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function defP(){return{level:0,nextDay:1,errorStreak:0,correct:0,wrong:0,introduced:false};}
function getMCOpts(correct,field){return shuffle([correct,...shuffle(VERBS.filter(v=>v[field]!==correct)).slice(0,3).map(v=>v[field])]);}
function makeBlank(sentence,form){
  const variants=form.includes("/")?form.split("/"):[form];
  for(const f of variants){const rx=new RegExp(`\\b${f}\\b`,"i");if(rx.test(sentence)){const m=sentence.match(rx)[0];return{blanked:sentence.replace(rx,"___"),answer:m};}}
  return null;
}
function buildQuiz(sv){
  const pool=[];
  sv.forEach(v=>{
    pool.push({id:`${v.id}-p`,vid:v.id,field:"p",type:"mc",q:`¿Cuál es el PASADO de "${v.b}"?`,correct:v.p,opts:getMCOpts(v.p,"p")});
    pool.push({id:`${v.id}-pp`,vid:v.id,field:"pp",type:"input",q:`Escribe el PARTICIPIO de "${v.b}":`,correct:v.pp});
    const b1=makeBlank(v.e[0],v.p);
    if(b1)pool.push({id:`${v.id}-bs`,vid:v.id,field:"p",type:"blank",q:`Completa con "${v.b}" (pasado):`,sentence:b1.blanked,correct:b1.answer});
    const b2=makeBlank(v.e[1],v.pp);
    if(b2)pool.push({id:`${v.id}-bpp`,vid:v.id,field:"pp",type:"blank",q:`Completa con "${v.b}" (participio):`,sentence:b2.blanked,correct:b2.answer});
  });
  return shuffle(pool).slice(0,12);
}
function buildSession(prog,day){
  const due=shuffle(VERBS.filter(v=>prog[v.id]?.introduced&&prog[v.id].nextDay<=day)).slice(0,REV_PER_DAY);
  const fresh=VERBS.filter(v=>!prog[v.id]?.introduced).slice(0,NEW_PER_DAY);
  return shuffle([...due,...fresh]);
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiCall(body){
  if(SCRIPT_URL==='REEMPLAZA_CON_TU_URL_DE_APPS_SCRIPT') throw new Error('⚙️ SCRIPT_URL no configurado. Ver README.');
  const res=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data=await res.json();
  if(data.error){
    console.error("Backend error:", data.error, body?.action||"unknown_action");
    throw new Error(data.error);
  }
  return data;
}
async function fetchAiFeedback(payload){
  const data=await apiCall({action:"aiCoach",...payload});
  return data.text||"";
}

                flex:1,padding:"10px",borderRadius:8,border:`1px solid ${mode===m?C.amber:C.border}`,

              onKeyDown={e=>e.key==="Enter"&&pin&&submit()}

          <div style={{marginBottom:20}}>

        <p style={{textAlign:"center",fontSize:12,color:C.textMut,marginTop:16}}>

    </div>
  );
}

function LeaderboardScreen({currentUser,onBack}){
  const [leaders,setLeaders]=useState(null);

  const medals=["🥇","🥈","🥉"];

  return(
    <div style={S.root}>

                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontWeight:700,fontSize:16,color:isMe?C.amber:C.textPri}}>{l.username}</span>
                    {isMe&&<span style={{...S.tag(C.amber),marginBottom:0,fontSize:10}}>TÚ</span>}
                  </div>
                  <div style={{display:"flex",gap:16,fontSize:12,color:C.textSec}}>
                    <span style={{color:C.green,fontWeight:600}}>💪 {l.mastered} dominados</span>
                    <span>📚 {l.introduced} vistos</span>
                    <span>🔥 {l.streak} días</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:20,fontWeight:700,color:C.amber}}>{Math.round((l.mastered/100)*100)}%</div>
                  <div style={{fontSize:10,color:C.textSec}}>dominados</div>

        {leaders&&leaders.length===0&&<div style={{...S.card,textAlign:"center",color:C.textSec}}>Nadie aquí todavía. ¡Sé el primero!</div>}
      </div>
    </div>
  );
}

  const col=!p?.introduced?C.violet:lv>=4?C.green:lv<=1?C.red:C.amber;
  const lbl=!p?.introduced?"✦ Nuevo":lv>=4?"💪 Dominado":lv<=1?"⚠ Débil":"🔄 Repasando";
  return(
    <div style={S.root}>
      <div style={S.wrap}>
        <div style={{paddingTop:32}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

              {[{form:v.b,label:"BASE",fc:C.textPri},{form:v.p,label:"PASADO",fc:C.amber},{form:v.pp,label:"PARTICIPIO",fc:C.green}].map(({form,label,fc},i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                  {i>0&&<span style={{color:C.textMut,fontSize:18}}>→</span>}
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:10,color:C.textSec,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>{label}</div>
                    <div style={{...mono,fontSize:i===0?24:18,color:fc}}>{form}</div>

}

function QuizScreen({qs,qi,answers,inputV,setInputV,fb,aiFeedback,onSubmit,onAdvance}){
  const q=qs[qi];
  if(!q)return null;
  const correct=Object.values(answers).filter(a=>a.ok).length;

  if(fb)return(
    <div style={S.root}>
      <div style={S.wrap}>
        <div style={{paddingTop:32}}>
          <Bar val={qi} max={qs.length}/>
          <div style={{...S.card,textAlign:"center",padding:"32px 24px",borderColor:fb.ok?C.green:C.red}}>
            <div style={{fontSize:48,marginBottom:10}}>{fb.ok?"✓":"✗"}</div>
            <div style={{fontSize:22,fontWeight:700,color:fb.ok?C.green:C.red,marginBottom:14}}>{fb.ok?"¡Correcto!":"Incorrecto"}</div>
            {!fb.ok&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,color:C.textSec,marginBottom:4}}>Tu respuesta</div>
                <div style={{...mono,fontSize:17,color:C.red,marginBottom:10}}>{fb.userAns||"(vacío)"}</div>
                <div style={{fontSize:12,color:C.textSec,marginBottom:4}}>Correcto</div>
                <div style={{...mono,fontSize:22,color:C.green}}>{fb.correctAns}</div>
                <div style={{marginTop:12,background:"#040d1a",borderRadius:10,padding:"12px 14px",textAlign:"left"}}>
                  <div style={{fontSize:10,color:C.violet,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:6}}>Consejo IA</div>
                  {aiFeedback?.loading&&<div style={{fontSize:13,color:C.textSec}}>Generando explicación...</div>}
                  {!aiFeedback?.loading&&aiFeedback?.error&&<div style={{fontSize:13,color:C.red}}>{aiFeedback.error}</div>}
                  {!aiFeedback?.loading&&!aiFeedback?.error&&aiFeedback?.text&&<div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.5}}>{aiFeedback.text}</div>}
                  {!aiFeedback?.loading&&!aiFeedback?.error&&!aiFeedback?.text&&<div style={{fontSize:13,color:C.textSec}}>Sin consejo disponible.</div>}
                </div>
              </div>
            )}
            {fb.ok&&<div style={{...mono,fontSize:22,color:C.green,marginBottom:14}}>{fb.correctAns}</div>}
            {fb.sentence&&(
              <div style={{background:"#040d1a",borderRadius:10,padding:"12px 14px",marginTop:10,fontSize:14,color:"#e2e8f0",fontStyle:"italic",lineHeight:1.6}}>
                {fb.sentence.replace("___",`[${fb.correctAns}]`)}
              </div>
            )}
          </div>
          <button style={S.btn(fb.ok?C.green:C.amber)} onClick={onAdvance}>
            {qi+1<qs.length?"Continuar →":"Ver resultados 🏁"}
          </button>
        </div>
      </div>
    </div>
  );

  const typeCol=q.type==="blank"?C.blue:q.field==="p"?C.amber:C.green;
  const typeLbl=q.type==="blank"?"✏️ Frase en contexto":q.field==="p"?"⏪ Pasado Simple":"✅ Participio Pasado";
  return(
    <div style={S.root}>
      <div style={S.wrap}>
        <div style={{paddingTop:32}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,color:C.textSec}}>Quiz — {qi+1}/{qs.length}</span>
            <span style={{fontSize:13,color:C.green,fontWeight:700}}>{correct} ✓</span>
          </div>
          <Bar val={qi} max={qs.length}/>
          <div style={S.tag(typeCol)}>{typeLbl}</div>
          <div style={S.card}>
            <h2 style={{fontSize:18,fontWeight:700,color:"#e2e8f0",marginBottom:q.type==="blank"?10:20,lineHeight:1.3}}>{q.q}</h2>
            {q.type==="blank"&&<div style={{background:"#040d1a",borderRadius:10,padding:"14px 16px",marginBottom:18,fontSize:15,color:"#e2e8f0",fontStyle:"italic",lineHeight:1.7}}>{q.sentence}</div>}
            {q.type==="mc"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {q.opts.map(opt=>(
                  <button key={opt} onClick={()=>onSubmit(q,opt)} style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"13px 8px",cursor:"pointer",color:"#e2e8f0",...mono,fontSize:14,textAlign:"center",fontFamily:"'JetBrains Mono',monospace"}}>{opt}</button>
                ))}
              </div>
            )}
            {(q.type==="input"||q.type==="blank")&&(
              <div>
                <input autoFocus value={inputV} onChange={e=>setInputV(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&inputV.trim()&&onSubmit(q,inputV)}
                  placeholder={q.type==="blank"?"Escribe la forma correcta...":"Escribe el participio..."}
                  style={S.input}/>
                <button style={{...S.btn(C.amber,12),opacity:inputV.trim()?1:0.4}} disabled={!inputV.trim()} onClick={()=>onSubmit(q,inputV)}>Confirmar →</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

            <div key={l} style={{...S.card,textAlign:"center",padding:"14px 8px",marginBottom:0}}>
              <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>

        {results.corrects.length>0&&(
          <div style={{...S.card,marginBottom:16}}>
            <div style={{fontSize:10,color:C.red,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}}>✗ Correcciones</div>
            {results.corrects.map((c,i)=>(
              <div key={i} style={{paddingBottom:12,marginBottom:12,borderBottom:i<results.corrects.length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{...mono,color:"#e2e8f0",fontSize:15}}>{c.verb.b}</span>
                  <span style={{...S.tag(c.field==="p"?C.amber:C.green),marginBottom:0,fontSize:10}}>{c.field==="p"?"PASADO":"PARTICIPIO"}</span>
                </div>
                <div style={{fontSize:13,color:C.red,marginBottom:3}}>Tu respuesta: <span style={mono}>{c.userAns||"(vacío)"}</span></div>
                <div style={{fontSize:13,color:C.green}}>Correcto: <span style={mono}>{c.correct}</span></div>
                <div style={{fontSize:11,color:C.violet,marginTop:4}}>🇪🇸 {c.verb.m}</div>
              </div>

          </div>

        {results.corrects.length===0&&<div style={{...S.card,textAlign:"center",color:C.green,marginBottom:16,fontSize:15}}>✓ ¡Sin errores! Todos los verbos avanzan de nivel.</div>}
        {aiRecap&&(
          <div style={{...S.card,marginBottom:16}}>
            <div style={{fontSize:10,color:C.violet,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>Resumen IA</div>
            {aiRecap.loading&&<div style={{fontSize:13,color:C.textSec}}>Analizando tus errores...</div>}
            {!aiRecap.loading&&aiRecap.error&&<div style={{fontSize:13,color:C.red}}>{aiRecap.error}</div>}
            {!aiRecap.loading&&!aiRecap.error&&aiRecap.text&&<div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.6}}>{aiRecap.text}</div>}
          </div>
        )}

        {results.errs.length>0&&(
          <div style={{...S.card,marginBottom:16}}>

//  STATS
// ══════════════════════════════════════════════════════════════════════════════
function StatsScreen({progress,onBack,onReset}){
  const [sfilt,setSfilt]=useState("all");
  const introduced=VERBS.filter(v=>progress[v.id]?.introduced).length;
  const filters=[{k:"all",l:"Todos"},{k:"strong",l:"💪 Fuertes"},{k:"reviewing",l:"🔄 Repaso"},{k:"weak",l:"⚠ Débiles"},{k:"new",l:"✦ Sin ver"}];
  const filtered=VERBS.filter(v=>{
    const p=progress[v.id],lv=p?.level||0;
    if(sfilt==="all")return true;if(sfilt==="new")return!p?.introduced;
    if(sfilt==="strong")return p?.introduced&&lv>=4;if(sfilt==="weak")return p?.introduced&&lv<=1;
    if(sfilt==="reviewing")return p?.introduced&&lv>1&&lv<4;return true;
  });
  return(
    <div style={S.root}>
      <div style={S.wrap}>
        <div style={{paddingTop:32,paddingBottom:16,display:"flex",alignItems:"center",gap:14}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:C.textSec,cursor:"pointer",fontSize:22}}>←</button>
          <h2 style={{margin:0,fontSize:20,fontWeight:700}}>Mi progreso · {introduced}/100</h2>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
          {filters.map(({k,l})=>(
            <button key={k} onClick={()=>setSfilt(k)} style={{background:sfilt===k?C.amber:"transparent",color:sfilt===k?"#000":C.textSec,border:`1px solid ${sfilt===k?C.amber:C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>{l}</button>
          ))}
        </div>
        <div style={{fontSize:12,color:C.textSec,marginBottom:10}}>{filtered.length} verbos</div>
        {filtered.map(v=>{
          const p=progress[v.id],lv=p?.level||0;
          const col=!p?.introduced?C.violet:lv>=4?C.green:lv<=1?C.red:C.amber;
          return(
            <div key={v.id} style={{...S.card,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:col,flexShrink:0}}/>
                <span style={{...mono,fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}>{v.b}</span>
                <span style={{...mono,fontSize:11,color:C.textSec,fontFamily:"'JetBrains Mono',monospace"}}>{v.p} · {v.pp}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:C.violet}}>{v.m}</span>
                {p?.introduced&&<span style={{fontSize:10,color:C.textSec}}>✓{p.correct} ✗{p.wrong}</span>}
                <span style={{...S.tag(col),marginBottom:0,fontSize:10}}>Lv {p?.introduced?p.level:"—"}</span>
              </div>
            </div>
          );
        })}
        <button onClick={onReset} style={{...S.ghost(20),color:C.red,borderColor:C.red+"44"}}>🗑 Reiniciar mi progreso</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("loading");
  const [user,setUser]=useState(null);
  const [progress,setProg]=useState({});
  const [history,setHistory]=useState([]);
  const [session,setSession]=useState([]);
  const [si,setSi]=useState(0);
  const [qs,setQs]=useState([]);
  const [qi,setQi]=useState(0);
  const [answers,setAnswers]=useState({});
  const [inputV,setInputV]=useState("");
  const [fb,setFb]=useState(null);
  const [aiFeedback,setAiFeedback]=useState({loading:false,error:"",text:"",key:""});
  const [aiRecap,setAiRecap]=useState(null);
  const [results,setResults]=useState(null);
  const [saving,setSaving]=useState(false);
  const aRef=useRef({});

  // Auto-login
  useEffect(()=>{
    const uname=localStorage.getItem("vm_username");
    const pin=localStorage.getItem("vm_pin");
    if(uname&&pin){
      apiCall({action:"login",username:uname,pin}).then(data=>{
        handleLogin(data);
      }).catch(()=>setScreen("login"));
    } else {
      setScreen("login");
    }
  },[]);

  function handleLogin(data){
    setUser({...data.user, pin: localStorage.getItem("vm_pin")});
    // Convert string keys to numbers for progress
    const p={};
    Object.entries(data.progress||{}).forEach(([k,v])=>{p[parseInt(k)]=v;});
    setProg(p);
    setHistory(data.history||[]);
    setScreen("home");
  }

  function logout(){
    localStorage.removeItem("vm_username");
    localStorage.removeItem("vm_pin");
    setUser(null);setProg({});setHistory([]);
    setScreen("login");
  }

  function startSession(){
    const s=buildSession(progress,user.dayNumber);
    if(!s.length)return;
    setSession(s);setSi(0);setFb(null);setAiFeedback({loading:false,error:"",text:"",key:""});setAiRecap(null);aRef.current={};setAnswers({});
    setScreen("study");
  }

  function nextStudy(){
    if(si+1<session.length)setSi(i=>i+1);
    else{const q=buildQuiz(session);setQs(q);setQi(0);aRef.current={};setAnswers({});setInputV("");setFb(null);setAiFeedback({loading:false,error:"",text:"",key:""});setScreen("quiz");}
  }

  function submitAnswer(q,userAns){
    const cleanAns=userAns.trim();
    const ok=cleanAns.toLowerCase()===q.correct.toLowerCase();
    const verb=VERBS.find(v=>v.id===q.vid);
    const entry={ans:cleanAns,correct:q.correct,ok,vid:q.vid,field:q.field};
    aRef.current={...aRef.current,[q.id]:entry};
    setAnswers({...aRef.current});
    const nextFb={
      ok,
      qid:q.id,
      qType:q.type,
      qText:q.q,
      field:q.field,
      verbBase:verb?.b||"",
      verbMeaning:verb?.m||"",
      userAns:cleanAns,
      correctAns:q.correct,
      sentence:q.sentence||null
    };
    setFb(nextFb);
    if(!ok){
      const reqKey=`${nextFb.qid}::${nextFb.userAns.toLowerCase()}`;
      setAiFeedback({loading:true,error:"",text:"",key:reqKey});
      fetchAiFeedback({
        questionType:nextFb.qType,
        questionText:nextFb.qText,
        sentence:nextFb.sentence,
        verbBase:nextFb.verbBase,
        verbMeaning:nextFb.verbMeaning,
        field:nextFb.field,
        userAnswer:nextFb.userAns,
        correctAnswer:nextFb.correctAns
      }).then(text=>{
        setAiFeedback(cur=>cur.key===reqKey?{loading:false,error:"",text,key:reqKey}:cur);
      }).catch((e)=>{
        console.error("AI feedback error:", e);
        setAiFeedback(cur=>cur.key===reqKey?{loading:false,error:"No se pudo generar consejo en este momento.",text:"",key:reqKey}:cur);
      });
    }else{
      setAiFeedback({loading:false,error:"",text:"",key:""});
    }
    setInputV("");
  }

  function advance(){
    setFb(null);
    setAiFeedback({loading:false,error:"",text:"",key:""});
    if(qi+1<qs.length)setQi(i=>i+1);
    else finishQuiz();
  }

  function finishQuiz(){
    const all=aRef.current;
    const score=Object.values(all).filter(a=>a.ok).length,total=qs.length;
    const newProg={...progress},vm={};
    qs.forEach(q=>{const a=all[q.id];if(!vm[q.vid])vm[q.vid]={ok:0,fail:0};if(a?.ok)vm[q.vid].ok++;else vm[q.vid].fail++;});
    Object.entries(vm).forEach(([id,r])=>{
      const vid=parseInt(id),c=newProg[vid]||defP();
      c.introduced=true;
      if(r.fail>0){c.wrong++;c.errorStreak=(c.errorStreak||0)+1;c.level=Math.max(0,c.level-1);c.nextDay=user.dayNumber+1;}
      else{c.correct++;c.errorStreak=0;c.level=Math.min(5,c.level+1);c.nextDay=user.dayNumber+INTERVALS[c.level];}
      newProg[vid]=c;
    });
    session.forEach(v=>{if(!newProg[v.id])newProg[v.id]=defP();newProg[v.id].introduced=true;});

    const newStreak=user.streak+1,newDay=user.dayNumber+1;
    const sessionEntry={day:user.dayNumber,score,total,pct:Math.round((score/total)*100)};
    const newHistory=[...history,sessionEntry].slice(-14);

    const st=VERBS.filter(v=>(newProg[v.id]?.level||0)>=4).length;
    const wk=VERBS.filter(v=>newProg[v.id]?.introduced&&(newProg[v.id]?.level||0)<=1).length;
    const rv=VERBS.filter(v=>newProg[v.id]?.introduced&&(newProg[v.id]?.level||0)>1&&(newProg[v.id]?.level||0)<4).length;
    const errs=[...new Set(Object.values(all).filter(a=>!a.ok).map(a=>a.vid))].map(id=>VERBS.find(v=>v.id===id)).filter(Boolean);
    const corrects=Object.values(all).filter(a=>!a.ok).map(a=>({verb:VERBS.find(v=>v.id===a.vid),field:a.field,userAns:a.ans,correct:a.correct})).filter(x=>x.verb);

    const updatedUser={...user,streak:newStreak,dayNumber:newDay};
    setUser(updatedUser);setProg(newProg);setHistory(newHistory);
    setResults({score,total,strong:st,weak:wk,reviewing:rv,errs,corrects});
    if(corrects.length){
      setAiRecap({loading:true,error:"",text:""});
      fetchAiFeedback({
        questionType:"session_summary",
        questionText:"Resume el patrón principal de errores de esta sesión en un párrafo breve.",
        sentence:"",
        verbBase:"resumen",
        verbMeaning:"resumen de sesión",
        field:"pp",
        userAnswer:corrects.map(c=>`${c.verb.b}|${c.field}|${c.userAns||"(vacío)"}`).join("; "),
        correctAnswer:corrects.map(c=>`${c.verb.b}|${c.correct}`).join("; ")
      }).then(text=>{
        setAiRecap({loading:false,error:"",text});
      }).catch((e)=>{
        console.error("AI recap error:", e);
        setAiRecap({loading:false,error:"No se pudo generar el resumen IA.",text:""});
      });
    }else{
      setAiRecap(null);
    }
    setScreen("results");

    // Save to Google Sheets
    setSaving(true);
    apiCall({
      action:"save",username:user.username,pin:user.pin,
      streak:newStreak,dayNumber:newDay,
      progress:newProg,session:sessionEntry
    }).finally(()=>setSaving(false));
  }

  function resetProgress(){
    if(!window.confirm("¿Reiniciar todo tu progreso? Esto no se puede deshacer."))return;
    const emptyProg={};
    const resetUser={...user,streak:0,dayNumber:1};
    setProg(emptyProg);setHistory([]);setUser(resetUser);
    apiCall({action:"save",username:user.username,pin:user.pin,streak:0,dayNumber:1,progress:{},session:null});
    setScreen("home");
  }

  if(screen==="loading")return<div style={{...S.root,display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;
  if(screen==="login")return<LoginScreen onLogin={handleLogin}/>;
  if(screen==="home")return<HomeScreen user={user} progress={progress} history={history} onStart={startSession} onLogout={logout} onStats={()=>setScreen("stats")} onLeaderboard={()=>setScreen("leaderboard")}/>;
  if(screen==="leaderboard")return<LeaderboardScreen currentUser={user?.username} onBack={()=>setScreen("home")}/>;
  if(screen==="study")return<StudyScreen session={session} si={si} onNext={nextStudy} onExit={()=>setScreen("home")} progress={progress}/>;
  if(screen==="quiz")return<QuizScreen qs={qs} qi={qi} answers={answers} inputV={inputV} setInputV={setInputV} fb={fb} aiFeedback={aiFeedback} onSubmit={submitAnswer} onAdvance={advance}/>;
  if(screen==="results")return<ResultsScreen results={results} streak={user.streak} saving={saving} aiRecap={aiRecap} onHome={()=>setScreen("home")} onStats={()=>setScreen("stats")}/>;
  if(screen==="stats")return<StatsScreen progress={progress} onBack={()=>setScreen("home")} onReset={resetProgress}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
