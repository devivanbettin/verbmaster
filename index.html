// ── HELPERS ───────────────────────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function defP(){return{level:0,nextDay:1,errorStreak:0,correct:0,wrong:0,introduced:false};}
function getMCOpts(correct,field){return shuffle([correct,...shuffle(VERBS.filter(v=>v[field]!==correct)).slice(0,3).map(v=>v[field])]);}
function makeBlank(sentence,form){
  const variants=form.includes("/")?form.split("/"):[form];
  for(const f of variants){const rx=new RegExp(`\\b${f}\\b`,"i");if(rx.test(sentence)){const m=sentence.match(rx)[0];return{blanked:sentence.replace(rx,"___"),answer:m};}}
  return null;
}
function buildQuiz(sv){
  const pool=[];
  sv.forEach(v=>{
    pool.push({id:`${v.id}-p`,vid:v.id,field:"p",type:"mc",q:`¿Cuál es el PASADO de "${v.b}"?`,correct:v.p,opts:getMCOpts(v.p,"p")});
    pool.push({id:`${v.id}-pp`,vid:v.id,field:"pp",type:"input",q:`Escribe el PARTICIPIO de "${v.b}":`,correct:v.pp});
    const b1=makeBlank(v.e[0],v.p);
    if(b1)pool.push({id:`${v.id}-bs`,vid:v.id,field:"p",type:"blank",q:`Completa con "${v.b}" (pasado):`,sentence:b1.blanked,correct:b1.answer});
    const b2=makeBlank(v.e[1],v.pp);
    if(b2)pool.push({id:`${v.id}-bpp`,vid:v.id,field:"pp",type:"blank",q:`Completa con "${v.b}" (participio):`,sentence:b2.blanked,correct:b2.answer});
  });
  return shuffle(pool).slice(0,12);
}
function buildSession(prog,day){
  const due=shuffle(VERBS.filter(v=>prog[v.id]?.introduced&&prog[v.id].nextDay<=day)).slice(0,REV_PER_DAY);
  const fresh=VERBS.filter(v=>!prog[v.id]?.introduced).slice(0,NEW_PER_DAY);
  return shuffle([...due,...fresh]);
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiCall(body){
  if(SCRIPT_URL==='REEMPLAZA_CON_TU_URL_DE_APPS_SCRIPT') throw new Error('⚙️ SCRIPT_URL no configurado. Ver README.');
  const res=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data=await res.json();
  if(data.error){
    console.error("Backend error:", data.error, body?.action||"unknown_action");
    throw new Error(data.error);
  }
  return data;
}
async function fetchAiFeedback(payload){
  const data=await apiCall({action:"aiCoach",...payload});
  return data.text||"";
}

function barColorClass(col){
  if(col===C.green)return "bg-emerald-400";
  if(col===C.red)return "bg-rose-400";
  if(col===C.blue)return "bg-sky-400";
  if(col===C.violet)return "bg-violet-400";
  return "bg-amber-400";
}

function Bar({val,max,col=C.amber}){
  const w=max?Math.round((val/max)*100):0;
  return <div className="mb-6 h-1.5 overflow-hidden rounded-full bg-white/10"><div className={`${barColorClass(col)} h-full rounded-full transition-all duration-300`} style={{width:`${w}%`}}/></div>;
}
function Spinner(){
  return (
    <div className="flex flex-col items-center justify-center gap-3 py-14 text-zinc-400">
      <div className="h-8 w-8 animate-spin rounded-full border-2 border-zinc-600 border-t-amber-300" />
      <span className="text-sm">Cargando...</span>
    </div>
  );
}

      const data=await apiCall({action:mode,username:username.trim(),pin:pin.trim()});
      localStorage.setItem("vm_username",username.trim().toLowerCase());
      localStorage.setItem("vm_pin",pin.trim());
      onLogin(data);
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  return(
    <Shell>
      <div className="mb-10 pt-8 text-center">
        <div className="mb-3 flex justify-center text-5xl"><FaBookOpen /></div>
        <h1 className="font-display text-4xl text-zinc-100">VerbMaster</h1>
        <p className="mt-2 text-sm text-zinc-300">Sistema de verbos irregulares en inglés</p>
      </div>

      <Panel className="mb-4">
        <div className="mb-6 grid grid-cols-2 gap-2 rounded-xl bg-black/20 p-1">
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}} className={`rounded-lg border px-3 py-2 text-sm font-semibold transition ${mode===m?"border-amber-300/80 bg-amber-300/20 text-amber-100":"border-white/10 bg-transparent text-zinc-300 hover:bg-white/5"}`}>
              {m==="login"?"Entrar":"Crear cuenta"}
            </button>
          ))}
        </div>

        <div className="mb-4">
          <label className="mb-2 block text-xs uppercase tracking-[0.2em] text-zinc-400">Usuario</label>
          <input className="w-full rounded-xl border border-white/10 bg-zinc-950/70 px-4 py-3 text-zinc-100 placeholder:text-zinc-500" value={username} onChange={e=>setUsername(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&pin&&submit()}
            placeholder="tu_nombre" autoCapitalize="none" autoCorrect="off" />
        </div>

        <div className="mb-5">
          <label className="mb-2 block text-xs uppercase tracking-[0.2em] text-zinc-400">PIN (4 dígitos)</label>
          <input className="font-mono-ui w-full rounded-xl border border-white/10 bg-zinc-950/70 px-4 py-3 text-zinc-100 placeholder:text-zinc-500" type="password" inputMode="numeric" maxLength={4}
            value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,"").slice(0,4))}
            onKeyDown={e=>e.key==="Enter"&&username&&submit()}
            placeholder="••••" />
        </div>

        {err&&<div className="mb-4 rounded-xl border border-rose-400/40 bg-rose-400/10 px-4 py-3 text-sm text-rose-200">{err}</div>}

        <button className="w-full rounded-xl bg-amber-300 px-4 py-3 text-sm font-bold text-zinc-950 transition hover:bg-amber-200 disabled:cursor-not-allowed disabled:opacity-45" onClick={submit} disabled={!username.trim()||pin.length!==4||loading}>
          {loading?"Conectando...":(mode==="login"?"Entrar →":"Crear cuenta →")}
        </button>
      </Panel>

      <p className="flex items-center justify-center gap-1 text-center text-xs text-zinc-400">Tu progreso se guarda en la nube <FaCloud className="inline" /></p>
    </Shell>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════════════════════════════════════
function HomeScreen({user,progress,history,onStart,onLogout,onStats,onLeaderboard}){
  const introduced=VERBS.filter(v=>progress[v.id]?.introduced).length;
  const strongCt=VERBS.filter(v=>(progress[v.id]?.level||0)>=4).length;
  const dueCt=VERBS.filter(v=>progress[v.id]?.introduced&&progress[v.id].nextDay<=user.dayNumber).length;
  const pct=Math.round((introduced/100)*100);
  const last7=(history||[]).slice(-7);

  return(
    <Shell>
      <div className="mb-4 flex items-center justify-between pt-1">
        <div>
          <div className="text-[11px] font-bold uppercase tracking-[0.35em] text-amber-200">VerbMaster</div>
          <h2 className="mt-1 text-2xl font-semibold text-zinc-100">Hola, {user.username} 👋</h2>
        </div>
        <button onClick={onLogout} className="rounded-lg border border-white/10 px-3 py-2 text-xs text-zinc-300 transition hover:bg-white/5">Salir</button>
      </div>

      <Panel className="mb-4 flex items-center justify-between">
        <div>
          <div className="mb-1 text-[10px] uppercase tracking-[0.2em] text-zinc-400">Progreso global</div>
          <div className="text-4xl font-bold text-amber-300">{pct}%</div>
          <div className="text-xs text-zinc-400">{introduced}/100 verbos · Día {user.dayNumber}</div>
        </div>
        <div className="text-center">
          <div className="flex justify-center text-3xl"><FaFire /></div>
          <div className="text-3xl font-bold text-amber-300">{user.streak}</div>
          <div className="text-xs text-zinc-400">días seguidos</div>
        </div>
      </Panel>
      <Bar val={introduced} max={100}/>

      <div className="mb-4 grid grid-cols-3 gap-2">
        {[{l:"Fuertes",v:strongCt,c:"text-emerald-300",i:<FaDumbbell />},{l:"Repasos",v:dueCt,c:"text-amber-300",i:<FaRotate />},{l:"Sin ver",v:100-introduced,c:"text-violet-300",i:<FaBookOpen />}].map(({l,v,c,i})=>(
          <Panel key={l} className="rounded-2xl p-3 text-center">
            <div className={`text-2xl font-bold ${c}`}>{v}</div>
            <div className="mt-1 flex items-center justify-center gap-1 text-[11px] text-zinc-400">{i}{l}</div>
          </Panel>
        ))}
      </div>

      {last7.length>0&&(
        <Panel className="mb-4">
          <div className="mb-3 text-[10px] uppercase tracking-[0.2em] text-zinc-400">Últimas sesiones</div>
          <div className="flex h-14 items-end gap-1.5">
            {last7.map((h,i)=>(
              <div key={i} className="flex flex-1 flex-col items-center gap-1">
                <div className={`w-full rounded-sm ${h.pct>=80?"bg-emerald-300":h.pct>=60?"bg-amber-300":"bg-rose-300"}`} style={{height:`${Math.max(4,Math.round((h.pct/100)*46))}px`}}/>
                <div className="text-[9px] text-zinc-400">{h.pct}%</div>
              </div>
            ))}
          </div>
        </Panel>
      )}

      <Panel className="mb-5 py-4 text-sm text-zinc-300">
        <span className="inline-flex items-center gap-1 font-semibold text-violet-300"><FaBookOpen /> {Math.min(NEW_PER_DAY,100-introduced)} nuevos</span>
        {"  ·  "}
        <span className="inline-flex items-center gap-1 font-semibold text-amber-300"><FaRotate /> {Math.min(dueCt,REV_PER_DAY)} repasos</span>
      </Panel>

      <button className="flex w-full items-center justify-center gap-2 rounded-xl bg-amber-300 px-4 py-3 text-sm font-bold text-zinc-950 transition hover:bg-amber-200" onClick={onStart}><FaRocket />Comenzar sesión</button>
      <button className="mt-2 flex w-full items-center justify-center gap-2 rounded-xl border border-white/15 bg-white/5 px-4 py-3 text-sm font-semibold text-zinc-200 transition hover:bg-white/10" onClick={onLeaderboard}><FaTrophy />Clasificación de amigos</button>
      <button className="mt-2 flex w-full items-center justify-center gap-2 rounded-xl border border-white/15 bg-white/5 px-4 py-3 text-sm font-semibold text-zinc-200 transition hover:bg-white/10" onClick={onStats}><FaChartLine />Mi progreso completo</button>
    </Shell>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  LEADERBOARD
// ══════════════════════════════════════════════════════════════════════════════
function LeaderboardScreen({currentUser,onBack}){
  const [leaders,setLeaders]=useState(null);
  const [err,setErr]=useState("");

  useEffect(()=>{
    apiCall({action:"leaderboard"}).then(d=>setLeaders(d.leaders)).catch(e=>setErr(e.message));
  },[]);

  const medals=["🥇","🥈","🥉"];

  return(
    <Shell>
      <div className="mb-5 flex items-center gap-3">
        <button onClick={onBack} className="text-2xl text-zinc-400 transition hover:text-zinc-200"><FaArrowLeft /></button>
        <h2 className="flex items-center gap-2 text-2xl font-semibold"><FaTrophy />Clasificación</h2>
      </div>

      {!leaders&&!err&&<Spinner/>}
      {err&&<Panel className="text-rose-300">{err}</Panel>}

      {leaders&&leaders.map((l,i)=>{
        const isMe=l.username===currentUser;
        return(
          <Panel key={l.username} className={`mb-2.5 rounded-2xl p-4 ${isMe?"border-amber-300/50":"border-white/10"}`}>
            <div className="flex items-center gap-3">
              <div className="min-w-8 text-center text-2xl">{medals[i]||`#${i+1}`}</div>
              <div className="flex-1">
                <div className="mb-1 flex items-center gap-2">
                  <span className={`text-base font-bold ${isMe?"text-amber-300":"text-zinc-100"}`}>{l.username}</span>
                  {isMe&&<span className="rounded-md border border-amber-300/40 bg-amber-300/15 px-2 py-0.5 text-[10px] font-bold text-amber-200">TÚ</span>}
                </div>
                <div className="flex gap-4 text-xs text-zinc-400">
                  <span className="inline-flex items-center gap-1 font-semibold text-emerald-300"><FaDumbbell /> {l.mastered} dominados</span>
                  <span className="inline-flex items-center gap-1"><FaBookOpen /> {l.introduced} vistos</span>
                  <span className="inline-flex items-center gap-1"><FaFire /> {l.streak} días</span>
                </div>
              </div>
              <div className="text-right">
                <div className="text-2xl font-bold text-amber-300">{Math.round((l.mastered/100)*100)}%</div>
                <div className="text-[10px] text-zinc-400">dominados</div>
              </div>
            </div>
            <div className="mt-3 h-1 overflow-hidden rounded-full bg-white/10">
              <div className="h-full rounded-full bg-amber-300" style={{width:`${Math.round((l.mastered/100)*100)}%`}}/>
            </div>
          </Panel>
        );
      })}

      {leaders&&leaders.length===0&&<Panel className="text-center text-zinc-400">Nadie aquí todavía. ¡Sé el primero!</Panel>}
    </Shell>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  STUDY
// ══════════════════════════════════════════════════════════════════════════════
function StudyScreen({session,si,onNext,onExit,progress}){
  const v=session[si];
  if(!v)return null;
  const p=progress[v.id],lv=p?.level||0;
  const col=!p?.introduced?C.violet:lv>=4?C.green:lv<=1?C.red:C.amber;
  const lbl=!p?.introduced?"Nuevo":lv>=4?"Dominado":lv<=1?"Débil":"Repasando";
  const lvlIcon=!p?.introduced?<FaStar />:lv>=4?<FaDumbbell />:lv<=1?<FaTriangleExclamation />:<FaRotate />;
  return(
    <Shell>
      <div className="mb-2 flex items-center justify-between">
        <span className="text-sm text-zinc-300">Estudio — {si+1}/{session.length}</span>
        <button onClick={onExit} className="text-xl text-zinc-400 transition hover:text-zinc-200"><FaTimes /></button>
      </div>
      <Bar val={si} max={session.length}/>
      <div className={`mb-3 inline-flex items-center gap-1 rounded-md border px-3 py-1 text-xs font-bold ${barColorClass(col).replace("bg-","border-")}/40 ${barColorClass(col).replace("bg-","text-")}`}>{lvlIcon}{lbl}</div>
      <Panel className="mb-4 text-center">
        <div className="mb-4 flex flex-wrap items-center justify-center gap-3">
          {[{form:v.b,label:"BASE",fc:"text-zinc-100"},{form:v.p,label:"PASADO",fc:"text-amber-300"},{form:v.pp,label:"PARTICIPIO",fc:"text-emerald-300"}].map(({form,label,fc},i)=>(
            <div key={i} className="flex items-center gap-3">
              {i>0&&<span className="text-zinc-500">→</span>}
              <div className="text-center">
                <div className="mb-1 text-[10px] uppercase tracking-[0.2em] text-zinc-400">{label}</div>
                <div className={`font-mono-ui ${i===0?"text-2xl":"text-lg"} ${fc}`}>{form}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="mb-5 inline-flex items-center gap-1 text-sm font-semibold text-violet-300"><FaLanguage /> {v.m}</div>
        <div className="border-t border-white/10 pt-4">
          <div className="mb-2 text-[10px] uppercase tracking-[0.2em] text-zinc-400">Ejemplos en contexto</div>
          {v.e.map((ex,i)=>(
            <div key={i} className="mb-2 rounded-xl bg-black/35 px-4 py-3 text-left">
              <span className={`mr-2 text-[10px] font-bold ${i===0?"text-amber-300":"text-emerald-300"}`}>{i===0?"PASADO":"PARTICIPIO"}</span>
              <span className="text-sm italic text-zinc-200">{ex}</span>
            </div>
          ))}
        </div>
      </Panel>
      <button className="w-full rounded-xl bg-amber-300 px-4 py-3 text-sm font-bold text-zinc-950 transition hover:bg-amber-200" onClick={onNext}>{si+1<session.length?"Siguiente →":"¡Al quiz! 🎯"}</button>
    </Shell>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════════════════════════════════
function QuizScreen({qs,qi,answers,inputV,setInputV,fb,aiFeedback,onSubmit,onAdvance}){
  const q=qs[qi];
  if(!q)return null;
  const correct=Object.values(answers).filter(a=>a.ok).length;

  if(fb)return(
    <Shell>
      <div className="mb-3 flex items-center justify-start">
        <div className="rounded-full border border-white/20 bg-white/5 px-3 py-1 text-sm text-zinc-300">{qi+1} / {qs.length}</div>
      </div>
      <Bar val={qi} max={qs.length}/>
      <Panel className={`mb-4 text-center ${fb.ok?"border-emerald-300/40":"border-rose-300/40"}`}>
        <div className="mb-2 flex justify-center text-5xl">{fb.ok?<FaCheck />:<FaXmark />}</div>
        <div className={`mb-4 text-2xl font-bold ${fb.ok?"text-emerald-300":"text-rose-300"}`}>{fb.ok?"¡Correcto!":"Incorrecto"}</div>
        {!fb.ok&&(
          <div className="mb-3">
            <div className="mb-1 text-xs text-zinc-400">Tu respuesta</div>
            <div className="font-mono-ui mb-3 text-lg text-rose-300">{fb.userAns||"(vacío)"}</div>
            <div className="mb-1 text-xs text-zinc-400">Correcto</div>
            <div className="font-mono-ui text-2xl text-emerald-300">{fb.correctAns}</div>
            <div className="mt-3 rounded-xl bg-black/35 p-3 text-left">
              <div className="mb-1 text-[10px] font-bold uppercase tracking-[0.2em] text-violet-300">Consejo IA</div>
              {aiFeedback?.loading&&<div className="text-sm text-zinc-400">Generando explicación...</div>}
              {!aiFeedback?.loading&&aiFeedback?.error&&<div className="text-sm text-rose-300">{aiFeedback.error}</div>}
              {!aiFeedback?.loading&&!aiFeedback?.error&&aiFeedback?.text&&<div className="text-sm leading-6 text-zinc-200">{aiFeedback.text}</div>}
              {!aiFeedback?.loading&&!aiFeedback?.error&&!aiFeedback?.text&&<div className="text-sm text-zinc-400">Sin consejo disponible.</div>}
            </div>
          </div>
        )}
        {fb.ok&&<div className="font-mono-ui mb-3 text-2xl text-emerald-300">{fb.correctAns}</div>}
        {fb.sentence&&(
          <div className="mt-2 rounded-xl bg-black/35 px-4 py-3 text-sm italic leading-7 text-zinc-200">
            {fb.sentence.replace("___",`[${fb.correctAns}]`)}
          </div>
        )}
      </Panel>
      <button className={`w-full rounded-xl px-4 py-3 text-sm font-bold transition ${fb.ok?"bg-emerald-300 text-zinc-950 hover:bg-emerald-200":"bg-amber-300 text-zinc-950 hover:bg-amber-200"}`} onClick={onAdvance}>
        {qi+1<qs.length?"Continuar →":"Ver resultados 🏁"}
      </button>
    </Shell>
  );

  const typeCol=q.type==="blank"?"text-sky-300 border-sky-300/40 bg-sky-300/10":q.field==="p"?"text-amber-300 border-amber-300/40 bg-amber-300/10":"text-emerald-300 border-emerald-300/40 bg-emerald-300/10";
  const typeLbl=q.type==="blank"?"Frase en contexto":q.field==="p"?"Pasado Simple":"Participio Pasado";
  return(
    <Shell>
      <div className="mb-3 flex items-center justify-between">
        <div className="rounded-full border border-white/20 bg-white/5 px-3 py-1 text-sm text-zinc-300">{qi+1} / {qs.length}</div>
        <span className="inline-flex items-center gap-1 text-sm font-bold text-emerald-300">{correct} <FaCheck /></span>
      </div>
      <Bar val={qi} max={qs.length}/>
      <div className={`mb-3 inline-flex items-center gap-1 rounded-md border px-3 py-1 text-xs font-bold ${typeCol}`}>{q.type==="blank"?<FaPenToSquare />:q.field==="p"?<FaReply />:<FaCircleCheck />}{typeLbl}</div>
      <Panel>
        <h2 className="font-display mb-5 text-4xl leading-tight text-zinc-100">{q.q}</h2>
        {q.type==="blank"&&<div className="mb-5 rounded-xl bg-black/35 px-4 py-3 text-[15px] italic leading-7 text-zinc-200">{q.sentence}</div>}
        {q.type==="mc"&&(
          <div className="overflow-hidden rounded-2xl border border-white/10 bg-black/25">
            {q.opts.map((opt,idx)=>(
              <button key={opt} onClick={()=>onSubmit(q,opt)} className={`flex w-full items-center gap-3 px-4 py-4 text-left transition hover:bg-white/5 ${idx<q.opts.length-1?"border-b border-white/10":""}`}>
                <span className="inline-flex h-7 w-7 items-center justify-center rounded-md bg-white/10 text-sm font-bold text-zinc-200">{String.fromCharCode(65+idx)}</span>
                <span className="font-mono-ui text-2xl text-zinc-100">{opt}</span>
              </button>
            ))}
          </div>
        )}
        {(q.type==="input"||q.type==="blank")&&(
          <div>
            <input autoFocus value={inputV} onChange={e=>setInputV(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&inputV.trim()&&onSubmit(q,inputV)}
              placeholder={q.type==="blank"?"Escribe la forma correcta...":"Escribe el participio..."}
              className="font-mono-ui w-full rounded-xl border-b border-white/30 bg-transparent px-1 py-3 text-2xl text-zinc-100 placeholder:text-zinc-500"/>
            <button className="mt-3 w-full rounded-xl bg-amber-300 px-4 py-3 text-sm font-bold text-zinc-950 transition hover:bg-amber-200 disabled:cursor-not-allowed disabled:opacity-40" disabled={!inputV.trim()} onClick={()=>onSubmit(q,inputV)}>Confirmar →</button>
          </div>
        )}
      </Panel>
    </Shell>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════════════════════════════════════
function ResultsScreen({results,streak,saving,aiRecap,onHome,onStats}){
  const pct=Math.round((results.score/results.total)*100);
  const[em,lb,rc]=pct>=90?[<FaTrophy />,"¡Perfecto!",C.green]:pct>=70?[<FaCheck />,"¡Buen trabajo!",C.amber]:[<FaDumbbell />,"Sigue practicando",C.red];
  return(
    <Shell>
      <div className="mb-5 pt-2 text-center">
        <div className="text-5xl">{em}</div>
        <div className={`mt-2 text-3xl font-bold ${rc===C.green?"text-emerald-300":rc===C.amber?"text-amber-300":"text-rose-300"}`}>{lb}</div>
        <div className="mt-1 text-4xl font-bold">{results.score}<span className="text-xl text-zinc-400">/{results.total}</span></div>
        <div className="flex items-center justify-center gap-1 text-sm text-zinc-400">{pct}% de aciertos · Racha <FaFire /> {streak}</div>
        {saving&&<div className="mt-2 flex items-center justify-center gap-1 text-xs text-zinc-400">Guardando en la nube... <FaCloud /></div>}
      </div>
      <div className="mb-4 grid grid-cols-3 gap-2">
        {[{l:"Fuertes",v:results.strong,c:"text-emerald-300",i:<FaDumbbell />},{l:"Repaso",v:results.reviewing,c:"text-amber-300",i:<FaRotate />},{l:"Débiles",v:results.weak,c:"text-rose-300",i:<FaTriangleExclamation />}].map(({l,v,c,i})=>(
          <Panel key={l} className="rounded-2xl p-3 text-center">
            <div className={`text-2xl font-bold ${c}`}>{v}</div>
            <div className="mt-1 flex items-center justify-center gap-1 text-[11px] text-zinc-400">{i}{l}</div>
          </Panel>
        ))}
      </div>
      {results.corrects.length>0&&(
        <Panel className="mb-4">
          <div className="mb-4 flex items-center gap-1 text-[10px] font-bold uppercase tracking-[0.2em] text-rose-300"><FaXmark /> Correcciones</div>
          {results.corrects.map((c,i)=>(
            <div key={i} className={`mb-3 pb-3 ${i<results.corrects.length-1?"border-b border-white/10":""}`}>
              <div className="mb-1 flex items-center justify-between">
                <span className="font-mono-ui text-base text-zinc-100">{c.verb.b}</span>
                <span className={`rounded-md border px-2 py-0.5 text-[10px] font-bold ${c.field==="p"?"border-amber-300/40 bg-amber-300/10 text-amber-300":"border-emerald-300/40 bg-emerald-300/10 text-emerald-300"}`}>{c.field==="p"?"PASADO":"PARTICIPIO"}</span>
              </div>
              <div className="text-sm text-rose-300">Tu respuesta: <span className="font-mono-ui">{c.userAns||"(vacío)"}</span></div>
              <div className="text-sm text-emerald-300">Correcto: <span className="font-mono-ui">{c.correct}</span></div>
              <div className="mt-1 inline-flex items-center gap-1 text-xs text-violet-300"><FaLanguage /> {c.verb.m}</div>
            </div>
          ))}
        </Panel>
      )}
      {results.corrects.length===0&&<Panel className="mb-4 text-center text-emerald-300"><span className="inline-flex items-center gap-1"><FaCheck /> ¡Sin errores! Todos los verbos avanzan de nivel.</span></Panel>}
      {aiRecap&&(
        <Panel className="mb-4">
          <div className="mb-2 text-[10px] font-bold uppercase tracking-[0.2em] text-violet-300">Resumen IA</div>
          {aiRecap.loading&&<div className="text-sm text-zinc-400">Analizando tus errores...</div>}
          {!aiRecap.loading&&aiRecap.error&&<div className="text-sm text-rose-300">{aiRecap.error}</div>}
          {!aiRecap.loading&&!aiRecap.error&&aiRecap.text&&<div className="text-sm leading-6 text-zinc-200">{aiRecap.text}</div>}
        </Panel>
      )}
      {results.errs.length>0&&(
        <Panel className="mb-4">
          <div className="mb-2 text-[10px] uppercase tracking-[0.2em] text-zinc-400">Mañana repetirás</div>
          {results.errs.map(v=>(
            <div key={v.id} className="font-mono-ui mb-1 text-sm text-zinc-300">
              <span className="text-rose-300">{v.b}</span> → {v.p} → <span className="text-emerald-300">{v.pp}</span>
            </div>
          ))}
        </Panel>
      )}
      <button className="w-full rounded-xl bg-amber-300 px-4 py-3 text-sm font-bold text-zinc-950 transition hover:bg-amber-200" onClick={onHome}>Volver al inicio</button>
      <button className="mt-2 w-full rounded-xl border border-white/15 bg-white/5 px-4 py-3 text-sm font-semibold text-zinc-200 transition hover:bg-white/10" onClick={onStats}>Ver mi progreso completo</button>
    </Shell>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  STATS
// ══════════════════════════════════════════════════════════════════════════════
function StatsScreen({progress,onBack,onReset}){
  const [sfilt,setSfilt]=useState("all");
  const introduced=VERBS.filter(v=>progress[v.id]?.introduced).length;
  const filters=[{k:"all",l:"Todos"},{k:"strong",l:"Fuertes"},{k:"reviewing",l:"Repaso"},{k:"weak",l:"Débiles"},{k:"new",l:"Sin ver"}];
  const filtered=VERBS.filter(v=>{
    const p=progress[v.id],lv=p?.level||0;
    if(sfilt==="all")return true;if(sfilt==="new")return!p?.introduced;
    if(sfilt==="strong")return p?.introduced&&lv>=4;if(sfilt==="weak")return p?.introduced&&lv<=1;
    if(sfilt==="reviewing")return p?.introduced&&lv>1&&lv<4;return true;
  });
  return(
    <Shell>
      <div className="mb-4 flex items-center gap-3">
        <button onClick={onBack} className="text-2xl text-zinc-400 transition hover:text-zinc-200"><FaArrowLeft /></button>
        <h2 className="text-2xl font-semibold">Mi progreso · {introduced}/100</h2>
      </div>
      <div className="mb-4 flex flex-wrap gap-2">
        {filters.map(({k,l})=>(
          <button key={k} onClick={()=>setSfilt(k)} className={`rounded-lg border px-3 py-1.5 text-xs font-semibold transition ${sfilt===k?"border-amber-300 bg-amber-300 text-zinc-950":"border-white/15 bg-white/5 text-zinc-300 hover:bg-white/10"}`}>{l}</button>
        ))}
      </div>
      <div className="mb-2 text-xs text-zinc-400">{filtered.length} verbos</div>
      {filtered.map(v=>{
        const p=progress[v.id],lv=p?.level||0;
        const col=!p?.introduced?"bg-violet-300 text-violet-200 border-violet-300/40":lv>=4?"bg-emerald-300 text-emerald-200 border-emerald-300/40":lv<=1?"bg-rose-300 text-rose-200 border-rose-300/40":"bg-amber-300 text-amber-200 border-amber-300/40";
        return(
          <Panel key={v.id} className="mb-2 rounded-2xl p-3">
            <div className="flex flex-wrap items-center justify-between gap-2">
              <div className="flex items-center gap-2">
                <div className={`h-2 w-2 rounded-full ${col.split(" ")[0]}`}/>
                <span className="font-mono-ui text-sm">{v.b}</span>
                <span className="font-mono-ui text-xs text-zinc-400">{v.p} · {v.pp}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-violet-300">{v.m}</span>
                {p?.introduced&&<span className="inline-flex items-center gap-2 text-[10px] text-zinc-400"><span className="inline-flex items-center gap-0.5"><FaCheck />{p.correct}</span><span className="inline-flex items-center gap-0.5"><FaXmark />{p.wrong}</span></span>}
                <span className={`rounded-md border px-2 py-0.5 text-[10px] font-bold ${col}`}>Lv {p?.introduced?p.level:"—"}</span>
              </div>
            </div>
          </Panel>
        );
      })}
      <button onClick={onReset} className="mt-4 w-full rounded-xl border border-rose-300/40 bg-rose-300/10 px-4 py-3 text-sm font-semibold text-rose-200 transition hover:bg-rose-300/20">🗑 Reiniciar mi progreso</button>
    </Shell>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("loading");
  const [user,setUser]=useState(null);
  const [progress,setProg]=useState({});
  const [history,setHistory]=useState([]);
  const [session,setSession]=useState([]);
  const [si,setSi]=useState(0);
  const [qs,setQs]=useState([]);
  const [qi,setQi]=useState(0);
  const [answers,setAnswers]=useState({});
  const [inputV,setInputV]=useState("");
  const [fb,setFb]=useState(null);
  const [aiFeedback,setAiFeedback]=useState({loading:false,error:"",text:"",key:""});
  const [aiRecap,setAiRecap]=useState(null);
  const [results,setResults]=useState(null);
  const [saving,setSaving]=useState(false);
  const aRef=useRef({});

  // Auto-login
  useEffect(()=>{
    const uname=localStorage.getItem("vm_username");
    const pin=localStorage.getItem("vm_pin");
    if(uname&&pin){
      apiCall({action:"login",username:uname,pin}).then(data=>{
        handleLogin(data);
      }).catch(()=>setScreen("login"));
    } else {
      setScreen("login");
    }
  },[]);

  function handleLogin(data){
    setUser({...data.user, pin: localStorage.getItem("vm_pin")});
    // Convert string keys to numbers for progress
    const p={};
    Object.entries(data.progress||{}).forEach(([k,v])=>{p[parseInt(k)]=v;});
    setProg(p);
    setHistory(data.history||[]);
    setScreen("home");
  }

  function logout(){
    localStorage.removeItem("vm_username");
    localStorage.removeItem("vm_pin");
    setUser(null);setProg({});setHistory([]);
    setScreen("login");
  }

  function startSession(){
    const s=buildSession(progress,user.dayNumber);
    if(!s.length)return;
    setSession(s);setSi(0);setFb(null);setAiFeedback({loading:false,error:"",text:"",key:""});setAiRecap(null);aRef.current={};setAnswers({});
    setScreen("study");
  }

  function nextStudy(){
    if(si+1<session.length)setSi(i=>i+1);
    else{const q=buildQuiz(session);setQs(q);setQi(0);aRef.current={};setAnswers({});setInputV("");setFb(null);setAiFeedback({loading:false,error:"",text:"",key:""});setScreen("quiz");}
  }

  function submitAnswer(q,userAns){
    const cleanAns=userAns.trim();
    const ok=cleanAns.toLowerCase()===q.correct.toLowerCase();
    const verb=VERBS.find(v=>v.id===q.vid);
    const entry={ans:cleanAns,correct:q.correct,ok,vid:q.vid,field:q.field};
    aRef.current={...aRef.current,[q.id]:entry};
    setAnswers({...aRef.current});
    const nextFb={
      ok,
      qid:q.id,
      qType:q.type,
      qText:q.q,
      field:q.field,
      verbBase:verb?.b||"",
      verbMeaning:verb?.m||"",
      userAns:cleanAns,
      correctAns:q.correct,
      sentence:q.sentence||null
    };
    setFb(nextFb);
    if(!ok){
      const reqKey=`${nextFb.qid}::${nextFb.userAns.toLowerCase()}`;
      setAiFeedback({loading:true,error:"",text:"",key:reqKey});
      fetchAiFeedback({
        questionType:nextFb.qType,
        questionText:nextFb.qText,
        sentence:nextFb.sentence,
        verbBase:nextFb.verbBase,
        verbMeaning:nextFb.verbMeaning,
        field:nextFb.field,
        userAnswer:nextFb.userAns,
        correctAnswer:nextFb.correctAns
      }).then(text=>{
        setAiFeedback(cur=>cur.key===reqKey?{loading:false,error:"",text,key:reqKey}:cur);
      }).catch((e)=>{
        console.error("AI feedback error:", e);
        setAiFeedback(cur=>cur.key===reqKey?{loading:false,error:"No se pudo generar consejo en este momento.",text:"",key:reqKey}:cur);
      });
    }else{
      setAiFeedback({loading:false,error:"",text:"",key:""});
    }
    setInputV("");
  }

  function advance(){
    setFb(null);
    setAiFeedback({loading:false,error:"",text:"",key:""});
    if(qi+1<qs.length)setQi(i=>i+1);
    else finishQuiz();
  }

  function finishQuiz(){
    const all=aRef.current;
    const score=Object.values(all).filter(a=>a.ok).length,total=qs.length;
    const newProg={...progress},vm={};
    qs.forEach(q=>{const a=all[q.id];if(!vm[q.vid])vm[q.vid]={ok:0,fail:0};if(a?.ok)vm[q.vid].ok++;else vm[q.vid].fail++;});
    Object.entries(vm).forEach(([id,r])=>{
      const vid=parseInt(id),c=newProg[vid]||defP();
      c.introduced=true;
      if(r.fail>0){c.wrong++;c.errorStreak=(c.errorStreak||0)+1;c.level=Math.max(0,c.level-1);c.nextDay=user.dayNumber+1;}
      else{c.correct++;c.errorStreak=0;c.level=Math.min(5,c.level+1);c.nextDay=user.dayNumber+INTERVALS[c.level];}
      newProg[vid]=c;
    });
    session.forEach(v=>{if(!newProg[v.id])newProg[v.id]=defP();newProg[v.id].introduced=true;});

    const newStreak=user.streak+1,newDay=user.dayNumber+1;
    const sessionEntry={day:user.dayNumber,score,total,pct:Math.round((score/total)*100)};
    const newHistory=[...history,sessionEntry].slice(-14);

    const st=VERBS.filter(v=>(newProg[v.id]?.level||0)>=4).length;
    const wk=VERBS.filter(v=>newProg[v.id]?.introduced&&(newProg[v.id]?.level||0)<=1).length;
    const rv=VERBS.filter(v=>newProg[v.id]?.introduced&&(newProg[v.id]?.level||0)>1&&(newProg[v.id]?.level||0)<4).length;
    const errs=[...new Set(Object.values(all).filter(a=>!a.ok).map(a=>a.vid))].map(id=>VERBS.find(v=>v.id===id)).filter(Boolean);
    const corrects=Object.values(all).filter(a=>!a.ok).map(a=>({verb:VERBS.find(v=>v.id===a.vid),field:a.field,userAns:a.ans,correct:a.correct})).filter(x=>x.verb);

    const updatedUser={...user,streak:newStreak,dayNumber:newDay};
    setUser(updatedUser);setProg(newProg);setHistory(newHistory);
    setResults({score,total,strong:st,weak:wk,reviewing:rv,errs,corrects});
    if(corrects.length){
      setAiRecap({loading:true,error:"",text:""});
      fetchAiFeedback({
        questionType:"session_summary",
        questionText:"Resume el patrón principal de errores de esta sesión en un párrafo breve.",
        sentence:"",
        verbBase:"resumen",
        verbMeaning:"resumen de sesión",
        field:"pp",
        userAnswer:corrects.map(c=>`${c.verb.b}|${c.field}|${c.userAns||"(vacío)"}`).join("; "),
        correctAnswer:corrects.map(c=>`${c.verb.b}|${c.correct}`).join("; ")
      }).then(text=>{
        setAiRecap({loading:false,error:"",text});
      }).catch((e)=>{
        console.error("AI recap error:", e);
        setAiRecap({loading:false,error:"No se pudo generar el resumen IA.",text:""});
      });
    }else{
      setAiRecap(null);
    }
    setScreen("results");

    // Save to Google Sheets
    setSaving(true);
    apiCall({
      action:"save",username:user.username,pin:user.pin,
      streak:newStreak,dayNumber:newDay,
      progress:newProg,session:sessionEntry
    }).finally(()=>setSaving(false));
  }

  function resetProgress(){
    if(!window.confirm("¿Reiniciar todo tu progreso? Esto no se puede deshacer."))return;
    const emptyProg={};
    const resetUser={...user,streak:0,dayNumber:1};
    setProg(emptyProg);setHistory([]);setUser(resetUser);
    apiCall({action:"save",username:user.username,pin:user.pin,streak:0,dayNumber:1,progress:{},session:null});
    setScreen("home");
  }

  if(screen==="loading")return <Shell><Spinner/></Shell>;
  if(screen==="login")return<LoginScreen onLogin={handleLogin}/>;
  if(screen==="home")return<HomeScreen user={user} progress={progress} history={history} onStart={startSession} onLogout={logout} onStats={()=>setScreen("stats")} onLeaderboard={()=>setScreen("leaderboard")}/>;
  if(screen==="leaderboard")return<LeaderboardScreen currentUser={user?.username} onBack={()=>setScreen("home")}/>;
  if(screen==="study")return<StudyScreen session={session} si={si} onNext={nextStudy} onExit={()=>setScreen("home")} progress={progress}/>;
  if(screen==="quiz")return<QuizScreen qs={qs} qi={qi} answers={answers} inputV={inputV} setInputV={setInputV} fb={fb} aiFeedback={aiFeedback} onSubmit={submitAnswer} onAdvance={advance}/>;
  if(screen==="results")return<ResultsScreen results={results} streak={user.streak} saving={saving} aiRecap={aiRecap} onHome={()=>setScreen("home")} onStats={()=>setScreen("stats")}/>;
  if(screen==="stats")return<StatsScreen progress={progress} onBack={()=>setScreen("home")} onReset={resetProgress}/>;
  return null;
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
